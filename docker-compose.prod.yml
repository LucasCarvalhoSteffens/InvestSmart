services:
  db:
    image: postgres:15-alpine
    container_name: investsmart_db
    restart: always
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - investsmart_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: investsmart_backend
    restart: always
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - investsmart_network

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: investsmart_scheduler
    restart: always
    env_file:
      - .env.production
    depends_on:
      - db
      - backend
    command: sh -c "while true; do python manage.py check_price_alerts || true; sleep 900; done"
    networks:
      - investsmart_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: investsmart_frontend
    restart: always
    depends_on:
      - backend
    volumes:
      - static_volume:/static
      - media_volume:/media
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    networks:
      - investsmart_network

  caddy:
    image: caddy:2-alpine
    container_name: investsmart_caddy
    restart: always
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - investsmart_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config:

networks:
  investsmart_network:
    driver: bridge