services:
  db:
    image: postgres:15-alpine
    container_name: investsmart_db
    restart: always
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - investsmart_network

  backend:
    build:
      context: ./backend
    container_name: investsmart_backend
    restart: always
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - investsmart_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: investsmart_frontend
    restart: always
    depends_on:
      - backend
    volumes:
      - static_volume:/static
      - media_volume:/media
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - investsmart_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  investsmart_network:
    driver: bridge