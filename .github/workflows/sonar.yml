name: SonarCloud

permissions:
  contents: read
  pull-requests: write
  checks: write

on:
  push:
    branches:
      - main
      - master
      - Dev
  pull_request:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          pip install -r requirements.txt

      - name: Run all backend tests with coverage
        env:
          PYTHONPATH: backend
          SECRET_KEY_DJANGO: investsmart-test-secret-key-with-more-than-32-chars
          DEBUG: "True"
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          coverage run backend/manage.py test --settings=config.settings_test --verbosity 2
          coverage xml -o backend/coverage.xml
          coverage report -m

      - name: Debug coverage file
        run: |
          ls -lah
          ls -lah backend
          test -f backend/coverage.xml && echo "coverage file found"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
