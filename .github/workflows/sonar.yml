name: SonarCloud

permissions:
  contents: read
  pull-requests: write
  checks: write

on:
  push:
    branches:
      - main
      - master
      - Dev
  pull_request:

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Backend
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        env:
          PYTHONPATH: backend
          SECRET_KEY_DJANGO: investsmart-test-secret-key-with-more-than-32-chars
          DEBUG: "True"
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: |
          coverage run backend/manage.py test apps.accounts.tests apps.assets.tests apps.valuation.tests apps.portfolios.tests --settings=config.settings_test --verbosity 2
          coverage xml -o backend/coverage.xml
          coverage report -m

      # =========================
      # Frontend
      # =========================
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      # =========================
      # Debug
      # =========================
      - name: Debug coverage files
        run: |
          test -f backend/coverage.xml && echo "backend/coverage.xml found"
          test -f frontend/coverage/lcov.info && echo "frontend/coverage/lcov.info found"
          echo "Frontend coverage is generated and validated by Vitest, but excluded from SonarCloud coverage gate."

      # =========================
      # SonarCloud
      # =========================
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
