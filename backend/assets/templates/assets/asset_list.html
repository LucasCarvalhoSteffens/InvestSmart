<h1>Assets</h1>
<a href="{% url 'asset_create' %}">Novo Ativo</a>

<ul>
    {% for asset in assets %}
        <li>
            {{ asset.ticker }} - {{ asset.current_price }}
            <a href="{% url 'asset_update' asset.pk %}">Editar</a>
            <a href="{% url 'asset_delete' asset.pk %}">Deletar</a>
        </li>
    {% endfor %}
</ul>
